import org.apache.tools.ant.types.resources.comparators.Date

apply plugin: 'opensearch.opensearchplugin'
// Plugin metadata
opensearchplugin {
  name = 'opensearch-iouring'
  description = 'IO-uring based Directory implementation for high-performance I/O'
  classname = 'org.opensearch.index.store.iouring.IOUringStorePlugin'
//  licenseFile = rootProject.file('LICENSE.txt')
//  noticeFile = rootProject.file('NOTICE.txt')
}

// Java version (25+ required for stable FFM API)
java {
  sourceCompatibility = JavaVersion.VERSION_25
  targetCompatibility = JavaVersion.VERSION_25
}

// Source sets
sourceSets {
  main {
    java {
      srcDirs = ['src/main/java', 'src/main/generated']
    }
    resources {
      srcDirs = ['src/main/resources']
    }
  }
}

repositories {
  mavenCentral()
}

dependencies {
  // OpenSearch dependencies (provided by the platform)
  compileOnly "org.opensearch:opensearch:${versions.opensearch}"

  // Logging
  compileOnly 'org.apache.logging.log4j:log4j-api:2.21.1'
  compileOnly 'org.apache.logging.log4j:log4j-core:2.21.1'

  // Testing
  testImplementation "org.opensearch.test:framework:${versions.opensearch}"
  testImplementation 'junit:junit:4.13.2'
  testImplementation 'org.mockito:mockito-core:5.8.0'
}

// Compiler arguments for Panama FFM API
tasks.withType(JavaCompile).configureEach {
  options.compilerArgs += [
    '--enable-preview',
    '-Xlint:-preview'
  ]
}

// Test configuration
test {
  jvmArgs += [
    '--enable-preview',
    '--enable-native-access=ALL-UNNAMED',
    "-Djava.library.path=${project.projectDir}/dist/native/lib"
  ]

  // Set library path environment
  environment 'LD_LIBRARY_PATH', "${project.projectDir}/dist/native/lib"

  // Test logging
  testLogging {
    events 'passed', 'skipped', 'failed'
    showStandardStreams = true
  }
}

// Task to build native library
task buildNative(type: Exec) {
  workingDir project.projectDir
  commandLine 'bash', 'scripts/build-native.sh'
}

// Task to generate bindings
task generateBindings(type: Exec) {
  dependsOn buildNative
  workingDir project.projectDir
  commandLine 'bash', 'scripts/generate-bindings.sh'
}

// Make sure bindings are generated before compiling Java
compileJava.dependsOn generateBindings

// Include native library in the distribution
distributions {
  main {
    contents {
      from('dist/native/lib') {
        into 'native'
        include '*.so'
      }
    }
  }
}

// JAR configuration
jar {
  from('dist/native/lib') {
    into 'native/linux-x86_64'
    include '*.so'
  }

  manifest {
    attributes(
      'Implementation-Title': 'OpenSearch IO-uring Plugin',
      'Implementation-Version': project.version,
      'Built-By': System.getProperty('user.name'),
      'Built-Date': new Date().format('yyyy-MM-dd HH:mm:ss'),
      'Enable-Native-Access': 'ALL-UNNAMED'
    )
  }
}

// Clean task extension
clean {
  delete 'dist'
  delete 'src/main/generated'
  delete 'native/build'
}
